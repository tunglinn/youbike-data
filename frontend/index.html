<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YouBike Live — Taipei</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── HEADER ── */
    header {
      background: #1a1d27;
      border-bottom: 1px solid #2d3148;
      padding: 0 20px;
      height: 52px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }
    header h1 {
      font-size: 18px;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.3px;
    }
    header .badge {
      background: #22c55e;
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 99px;
      letter-spacing: 0.5px;
    }

    /* ── STATS BAR ── */
    #stats-bar {
      background: #13161f;
      border-bottom: 1px solid #2d3148;
      padding: 0 20px;
      height: 44px;
      display: flex;
      align-items: center;
      gap: 28px;
      flex-shrink: 0;
      overflow-x: auto;
    }
    .stat-item {
      display: flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }
    .stat-label {
      font-size: 11px;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .stat-value {
      font-size: 13px;
      font-weight: 600;
      color: #cbd5e1;
    }
    .stat-divider { width: 1px; height: 20px; background: #2d3148; }
    #status-dot, #sum-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      display: inline-block;
      flex-shrink: 0;
    }
    #status-dot.green, #sum-dot.green { background: #22c55e; box-shadow: 0 0 6px #22c55e88; }
    #status-dot.red,   #sum-dot.red   { background: #ef4444; box-shadow: 0 0 6px #ef444488; }

    /* ── MAIN BODY ── */
    #main {
      display: flex;
      flex: 1;
      overflow: hidden;
      min-height: 0;
    }

    /* ── MAP ── */
    #map-col {
      flex: 60;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }
    #map {
      flex: 1;
      min-height: 0;
    }

    /* ── ALERT STRIP ── */
    #alert-strip {
      background: #13161f;
      border-top: 1px solid #2d3148;
      flex-shrink: 0;
      height: 160px;
      display: flex;
      flex-direction: column;
    }
    #alert-tabs {
      display: flex;
      border-bottom: 1px solid #2d3148;
      flex-shrink: 0;
    }
    .alert-tab {
      padding: 6px 14px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      border-bottom: 2px solid transparent;
      color: #64748b;
      transition: color 0.15s;
      user-select: none;
    }
    .alert-tab.active { color: #e2e8f0; border-bottom-color: #6366f1; }
    .alert-tab .count {
      font-size: 10px;
      font-weight: 700;
      padding: 1px 6px;
      border-radius: 99px;
    }
    .alert-tab.empty-tab .count  { background: #dc2626; color: #fff; }
    .alert-tab.full-tab .count   { background: #2563eb; color: #fff; }
    .alert-tab.low-tab .count    { background: #d97706; color: #fff; }
    #alert-content {
      flex: 1;
      overflow-y: auto;
      padding: 6px 8px;
    }
    .alert-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 5px 8px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      transition: background 0.1s;
    }
    .alert-item:hover { background: #1e2130; }
    .alert-item .a-name { color: #cbd5e1; }
    .alert-item .a-count { font-weight: 700; font-size: 11px; padding: 1px 7px; border-radius: 99px; }
    .alert-item.empty .a-count  { background: #7f1d1d; color: #fca5a5; }
    .alert-item.full  .a-count  { background: #1e3a8a; color: #93c5fd; }
    .alert-item.low   .a-count  { background: #78350f; color: #fcd34d; }

    /* ── RIGHT PANEL ── */
    #detail-col {
      flex: 40;
      background: #1a1d27;
      border-left: 1px solid #2d3148;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-width: 320px;
    }
    #detail-panel {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    #detail-empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #4b5563;
      text-align: center;
      gap: 10px;
    }
    #detail-empty .icon { font-size: 40px; }
    #detail-empty p { font-size: 14px; }

    #detail-info { display: none; }
    #detail-info.visible { display: block; }

    .station-name {
      font-size: 15px;
      font-weight: 700;
      color: #f1f5f9;
      line-height: 1.3;
    }
    .station-uid {
      font-size: 11px;
      color: #475569;
      margin-top: 2px;
    }
    .counts-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
      margin-top: 4px;
    }
    .count-card {
      background: #0f1117;
      border: 1px solid #2d3148;
      border-radius: 8px;
      padding: 10px;
      text-align: center;
    }
    .count-card .cc-label { font-size: 10px; color: #64748b; text-transform: uppercase; letter-spacing: 0.4px; }
    .count-card .cc-val   { font-size: 22px; font-weight: 700; margin-top: 2px; }
    .count-card.bikes  .cc-val { color: #22c55e; }
    .count-card.docks  .cc-val { color: #3b82f6; }
    .count-card.cap    .cc-val { color: #94a3b8; }

    .chart-wrap {
      background: #0f1117;
      border: 1px solid #2d3148;
      border-radius: 8px;
      padding: 12px;
    }
    .chart-wrap h3 {
      font-size: 11px;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 10px;
    }
    #history-chart { width: 100% !important; height: 160px !important; }

    /* Scrollbar styling */
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #2d3148; border-radius: 2px; }

    /* ── STATS SUMMARY (mobile collapsed line) ── */
    #stats-summary {
      display: none; /* hidden on desktop */
    }
    .sum-sep { color: #3d4460; font-size: 13px; }
    #stats-chevron {
      margin-left: auto;
      flex-shrink: 0;
      display: inline-block;
      width: 16px;
      height: 16px;
      position: relative;
      transition: transform 0.2s;
    }
    #stats-chevron::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 7px;
      height: 7px;
      border-right: 2px solid #64748b;
      border-bottom: 2px solid #64748b;
      transform: translate(-50%, -65%) rotate(45deg);
    }
    #stats-bar.expanded #stats-chevron { transform: rotate(180deg); }
    #stats-grid { display: contents; } /* neutral wrapper on desktop */

    @media (max-width: 768px) {
      #stats-bar {
        flex-direction: column;
        height: auto;
        padding: 0;
        gap: 0;
      }
      #stats-summary {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 0 14px;
        height: 40px;
        cursor: pointer;
        user-select: none;
        width: 100%;
      }
      #stats-grid {
        display: none;
        flex-wrap: wrap;
        padding: 8px 14px 10px;
        border-top: 1px solid #2d3148;
      }
      #stats-bar.expanded #stats-grid { display: flex; }
      #stats-grid .stat-item {
        width: 33.333%;
        flex-direction: column;
        gap: 2px;
        padding: 5px 0;
      }
      #stats-grid .stat-divider { display: none; }
    }

    /* ── MOBILE BOTTOM SHEET ── */
    #sheet-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.55);
      z-index: 999;
    }
    #sheet-handle {
      display: none;
      width: 36px;
      height: 4px;
      background: #3d4460;
      border-radius: 2px;
      margin: 10px auto 0;
      flex-shrink: 0;
    }
    #sheet-close {
      display: none;
      position: absolute;
      top: 10px;
      right: 12px;
      background: none;
      border: none;
      color: #64748b;
      font-size: 22px;
      line-height: 1;
      cursor: pointer;
      padding: 2px 6px;
    }
    #sheet-close:hover { color: #e2e8f0; }

    @media (max-width: 768px) {
      #detail-col {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        z-index: 1000;

        width: 100%;
        flex: none;
        min-width: unset;
        border-left: none;
        border-top: 1px solid #2d3148;
        border-radius: 16px 16px 0 0;
        transform: translateY(100%);
        transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      }
      #detail-col.sheet-open    { transform: translateY(0); }
      #sheet-backdrop.visible   { display: block; }
      #sheet-handle             { display: block; }
      #sheet-close              { display: block; }
      #map-col                  { flex: 1; }
      #alert-strip              { height: 140px; }
      #stats-bar                { gap: 16px; padding: 0 12px; }
    }
  </style>
</head>

// 24h dummy history — one reading every 10 minutes
const DUMMY_HISTORY = Array.from({ length: 144 }, (_, i) => ({
  timestamp: Date.now() / 1000 - (143 - i) * 600,
  available_rent_bikes: Math.max(0, Math.round(8 + 6 * Math.sin(i / 144 * Math.PI * 4) + Math.random() * 2)),

}));

/* ═══════════════════════════════════════════════
   HELPERS
═══════════════════════════════════════════════ */

function formatUptime(seconds) {
  const d = Math.floor(seconds / 86400);
  const h = Math.floor((seconds % 86400) / 3600);
  const m = Math.floor((seconds % 3600) / 60);
  const parts = [];
  if (d) parts.push(d + "d");
  if (h) parts.push(h + "h");
  parts.push(m + "m");
  return parts.join(" ");
}

function formatRelativeTime(unixTs) {
  const diff = Math.floor(Date.now() / 1000 - unixTs);
  if (diff < 60) return diff + "s ago";
  if (diff < 3600) return Math.floor(diff / 60) + "m ago";
  return Math.floor(diff / 3600) + "h ago";
}

function formatHHMM(unixTs) {
  const d = new Date(unixTs * 1000);
  return d.getHours().toString().padStart(2, "0") + ":" + d.getMinutes().toString().padStart(2, "0");
}

function markerColor(available) {
  if (available === 0) return "#ef4444";
  if (available <= 4)  return "#f59e0b";
  return "#22c55e";
}

/* ═══════════════════════════════════════════════
   STATS BAR
═══════════════════════════════════════════════ */

function renderStats(stats) {
  const scrapeLabel = formatRelativeTime(stats.last_scrape_time);
  const rowsLabel   = (stats.total_rows / 1000).toFixed(0) + "k rows";

  document.getElementById("s-rows").textContent   = stats.total_rows.toLocaleString();
  document.getElementById("s-dbsize").textContent = stats.db_size_mb.toFixed(1) + " MB";
  document.getElementById("s-scrape").textContent = scrapeLabel;
  document.getElementById("s-today").textContent  = stats.scrapes_today.toLocaleString();
  document.getElementById("s-uptime").textContent = formatUptime(stats.uptime_seconds);

  // summary line
  document.getElementById("sum-scrape").textContent = scrapeLabel;
  document.getElementById("sum-rows").textContent   = rowsLabel;

  const ageSeconds = Date.now() / 1000 - stats.last_scrape_time;
  const online = ageSeconds < 600;

  document.getElementById("status-dot").className  = online ? "green" : "red";
  document.getElementById("sum-dot").className     = online ? "green" : "red";

  const label = online ? "Online" : "Stale";
  const color = online ? "#22c55e" : "#ef4444";
  document.getElementById("s-status").textContent  = label;
  document.getElementById("s-status").style.color  = color;
  document.getElementById("sum-status").textContent = label;
  document.getElementById("sum-status").style.color = color;
}

function toggleStats() {
  document.getElementById("stats-bar").classList.toggle("expanded");
}

/* ═══════════════════════════════════════════════
   MAP
═══════════════════════════════════════════════ */

const map = L.map("map").setView([25.0330, 121.5654], 13);
L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
  attribution: "© OpenStreetMap contributors",
  maxZoom: 19
}).addTo(map);

// station_uid → leaflet circle marker
const markerMap = {};

function buildMarkers(stations) {
  stations.forEach(st => {
    const color  = markerColor(st.available_rent_bikes);
    const circle = L.circleMarker([st.lat, st.lng], {
      radius: 9,
      fillColor: color,
      color: "#fff",
      weight: 1.5,
      fillOpacity: 0.9
    }).addTo(map);

    circle.bindTooltip(
      `<b>${st.name}</b><br>🚲 ${st.available_rent_bikes} bikes`,
      { direction: "top", offset: [0, -6] }
    );

    circle.on("click", () => selectStation(st, DUMMY_HISTORY));
    markerMap[st.station_uid] = { circle, station: st };
  });
}

let activeUid = null;
let historyChart = null;

function selectStation(station, history) {
  // Reset previous selection ring
  if (activeUid && markerMap[activeUid]) {
    const prev = markerMap[activeUid].circle;
    prev.setStyle({ weight: 1.5, color: "#fff" });
  }

  activeUid = station.station_uid;
  const { circle } = markerMap[station.station_uid];
  circle.setStyle({ weight: 3, color: "#818cf8" });
  map.panTo(circle.getLatLng());

  // Open bottom sheet on mobile
  if (window.innerWidth <= 768) {
    document.getElementById("detail-col").classList.add("sheet-open");
    document.getElementById("sheet-backdrop").classList.add("visible");
  }

  // Update detail panel
  document.getElementById("detail-empty").style.display = "none";
  document.getElementById("detail-info").classList.add("visible");
  document.getElementById("d-name").textContent  = station.name;
  document.getElementById("d-uid").textContent   = "UID: " + station.station_uid;
  document.getElementById("d-bikes").textContent = station.available_rent_bikes;
  document.getElementById("d-docks").textContent = station.available_return_bikes;
  document.getElementById("d-cap").textContent   = station.capacity;

  renderChart(history, station.capacity);
}

function renderChart(history, capacity) {
  const labels = history.map(h => formatHHMM(h.timestamp));
  const data   = history.map(h => h.available_rent_bikes);

  if (historyChart) historyChart.destroy();

  const ctx = document.getElementById("history-chart").getContext("2d");
  historyChart = new Chart(ctx, {
    type: "line",
    data: {
      labels,
      datasets: [{
        label: "Available bikes",
        data,
        borderColor: "#6366f1",
        backgroundColor: "rgba(99,102,241,0.15)",
        borderWidth: 2,
        pointRadius: 0,
        fill: true,
        tension: 0.4
      }]
    },
    options: {
      animation: false,
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: {
          ticks: {
            color: "#64748b",
            maxTicksLimit: 8,
            font: { size: 10 }
          },
          grid: { color: "#1e2535" }
        },
        y: {
          min: 0,
          max: capacity,
          ticks: { color: "#64748b", font: { size: 10 }, stepSize: Math.ceil(capacity / 4) },
          grid: { color: "#1e2535" }
        }
      }
    }
  });
}

function closeSheet() {
  document.getElementById("detail-col").classList.remove("sheet-open");
  document.getElementById("sheet-backdrop").classList.remove("visible");
}

/* ═══════════════════════════════════════════════
   ALERT STRIP
═══════════════════════════════════════════════ */

let currentTab = "empty";

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll(".alert-tab").forEach(el => {
    el.classList.toggle("active", el.dataset.tab === tab);
  });
  renderAlertContent(DUMMY_LIVE);
}

function renderAlerts(live) {
  document.getElementById("cnt-empty").textContent = live.empty.length;
  document.getElementById("cnt-full").textContent  = live.full.length;
  document.getElementById("cnt-low").textContent   = live.low.length;
  renderAlertContent(live);
}

function renderAlertContent(live) {
  const items = live[currentTab] || [];
  const container = document.getElementById("alert-content");

  if (items.length === 0) {
    container.innerHTML = `<div style="padding:10px;color:#4b5563;font-size:12px;">No stations in this category.</div>`;
    return;
  }

  container.innerHTML = items.map(st => {
    const countLabel = currentTab === "empty"
      ? `${st.available_rent_bikes} bikes`
      : currentTab === "full"
        ? `${st.available_return_bikes} docks`
        : `${st.available_rent_bikes} bikes`;

    return `
      <div class="alert-item ${currentTab}" onclick="selectFromAlert('${st.station_uid}')">
        <span class="a-name">${st.name}</span>
        <span class="a-count">${countLabel}</span>
      </div>`;
  }).join("");
}

function selectFromAlert(uid) {
  const entry = markerMap[uid];
  if (!entry) return;
  map.setView(entry.circle.getLatLng(), 15);
  selectStation(entry.station, DUMMY_HISTORY);
}

/* ═══════════════════════════════════════════════
   INIT
═══════════════════════════════════════════════ */

renderStats(DUMMY_STATS);
buildMarkers(DUMMY_STATIONS);
renderAlerts(DUMMY_LIVE);
</script>
</body>
</html>
