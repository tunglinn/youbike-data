<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YouBike Live — Taipei</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── HEADER ── */
    header {
      background: #1a1d27;
      border-bottom: 1px solid #2d3148;
      padding: 0 20px;
      height: 52px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }
    header h1 {
      font-size: 18px;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.3px;
    }
    header .badge {
      background: #22c55e;
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 99px;
      letter-spacing: 0.5px;
    }

    /* ── STATS BAR ── */
    #stats-bar {
      background: #13161f;
      border-bottom: 1px solid #2d3148;
      padding: 0 20px;
      height: 44px;
      display: flex;
      align-items: center;
      gap: 28px;
      flex-shrink: 0;
      overflow-x: auto;
    }
    .stat-item {
      display: flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }
    .stat-label {
      font-size: 11px;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .stat-value {
      font-size: 13px;
      font-weight: 600;
      color: #cbd5e1;
    }
    .stat-divider { width: 1px; height: 20px; background: #2d3148; }
    #status-dot, #sum-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      display: inline-block;
      flex-shrink: 0;
    }
    #status-dot.green, #sum-dot.green { background: #22c55e; box-shadow: 0 0 6px #22c55e88; }
    #status-dot.red,   #sum-dot.red   { background: #ef4444; box-shadow: 0 0 6px #ef444488; }

    /* ── MAIN BODY ── */
    #main {
      display: flex;
      flex: 1;
      overflow: hidden;
      min-height: 0;
    }

    /* ── MAP ── */
    #map-col {
      flex: 60;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }
    #map {
      flex: 1;
      min-height: 0;
      position: relative;
    }
    #map-loading {
      position: absolute;
      inset: 0;
      z-index: 1000;
      background: rgba(15, 17, 23, 0.85);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: #64748b;
      font-size: 13px;
      pointer-events: none;
    }
    #map-loading.hidden { display: none; }
    .spinner {
      width: 22px; height: 22px;
      border: 2.5px solid #2d3148;
      border-top-color: #6366f1;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .chart-state {
      text-align: center;
      font-size: 12px;
      color: #4b5563;
      padding: 20px 0;
    }
    .chart-state.hidden { display: none; }

    /* ── ALERT STRIP ── */
    #alert-strip {
      background: #13161f;
      border-top: 1px solid #2d3148;
      flex-shrink: 0;
      height: 160px;
      display: flex;
      flex-direction: column;
    }
    #alert-tabs {
      display: flex;
      border-bottom: 1px solid #2d3148;
      flex-shrink: 0;
    }
    .alert-tab {
      padding: 6px 14px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      border-bottom: 2px solid transparent;
      color: #64748b;
      transition: color 0.15s;
      user-select: none;
    }
    .alert-tab.active { color: #e2e8f0; border-bottom-color: #6366f1; }
    .alert-tab .count {
      font-size: 10px;
      font-weight: 700;
      padding: 1px 6px;
      border-radius: 99px;
    }
    .alert-tab.empty-tab .count  { background: #dc2626; color: #fff; }
    .alert-tab.full-tab .count   { background: #2563eb; color: #fff; }
    .alert-tab.low-tab .count    { background: #d97706; color: #fff; }
    #alert-content {
      flex: 1;
      overflow-y: auto;
      padding: 6px 8px;
    }
    .alert-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 5px 8px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      transition: background 0.1s;
    }
    .alert-item:hover { background: #1e2130; }
    .alert-item .a-name { color: #cbd5e1; }
    .alert-item .a-count { font-weight: 700; font-size: 11px; padding: 1px 7px; border-radius: 99px; }
    .alert-item.empty .a-count  { background: #7f1d1d; color: #fca5a5; }
    .alert-item.full  .a-count  { background: #1e3a8a; color: #93c5fd; }
    .alert-item.low   .a-count  { background: #78350f; color: #fcd34d; }

    /* ── RIGHT PANEL ── */
    #detail-col {
      flex: 40;
      background: #1a1d27;
      border-left: 1px solid #2d3148;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-width: 320px;
    }
    #detail-panel {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    #detail-empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #4b5563;
      text-align: center;
      gap: 10px;
    }
    #detail-empty .icon { font-size: 40px; }
    #detail-empty p { font-size: 14px; }

    #detail-info { display: none; }
    #detail-info.visible { display: block; }

    .station-name {
      font-size: 15px;
      font-weight: 700;
      color: #f1f5f9;
      line-height: 1.3;
    }
    .station-uid {
      font-size: 11px;
      color: #475569;
      margin-top: 2px;
    }
    .counts-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
      margin-top: 4px;
    }
    .count-card {
      background: #0f1117;
      border: 1px solid #2d3148;
      border-radius: 8px;
      padding: 10px;
      text-align: center;
    }
    .count-card .cc-label { font-size: 10px; color: #64748b; text-transform: uppercase; letter-spacing: 0.4px; }
    .count-card .cc-val   { font-size: 22px; font-weight: 700; margin-top: 2px; }
    .count-card.bikes  .cc-val { color: #22c55e; }
    .count-card.docks  .cc-val { color: #3b82f6; }
    .count-card.cap    .cc-val { color: #94a3b8; }

    .chart-wrap {
      background: #0f1117;
      border: 1px solid #2d3148;
      border-radius: 8px;
      padding: 12px;
    }
    .chart-wrap h3 {
      font-size: 11px;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 10px;
    }
    #history-chart { width: 100% !important; height: 160px !important; }

    /* Scrollbar styling */
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #2d3148; border-radius: 2px; }

    /* ── STATS SUMMARY (mobile collapsed line) ── */
    #stats-summary {
      display: none; /* hidden on desktop */
    }
    .sum-sep { color: #3d4460; font-size: 13px; }
    #stats-chevron {
      margin-left: auto;
      flex-shrink: 0;
      display: inline-block;
      width: 16px;
      height: 16px;
      position: relative;
      transition: transform 0.2s;
    }
    #stats-chevron::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 7px;
      height: 7px;
      border-right: 2px solid #64748b;
      border-bottom: 2px solid #64748b;
      transform: translate(-50%, -65%) rotate(45deg);
    }
    #stats-bar.expanded #stats-chevron { transform: rotate(180deg); }
    #stats-grid { display: contents; } /* neutral wrapper on desktop */

    @media (max-width: 768px) {
      #stats-bar {
        flex-direction: column;
        height: auto;
        padding: 0;
        gap: 0;
      }
      #stats-summary {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 0 14px;
        height: 40px;
        cursor: pointer;
        user-select: none;
        width: 100%;
      }
      #stats-grid {
        display: none;
        flex-wrap: wrap;
        padding: 8px 14px 10px;
        border-top: 1px solid #2d3148;
      }
      #stats-bar.expanded #stats-grid { display: flex; }
      #stats-grid .stat-item {
        width: 33.333%;
        flex-direction: column;
        gap: 2px;
        padding: 5px 0;
      }
      #stats-grid .stat-divider { display: none; }
    }

    /* ── MOBILE BOTTOM SHEET ── */
    #sheet-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.55);
      z-index: 999;
    }
    #sheet-handle {
      display: none;
      width: 36px;
      height: 4px;
      background: #3d4460;
      border-radius: 2px;
      margin: 10px auto 0;
      flex-shrink: 0;
    }
    #sheet-close {
      display: none;
      position: absolute;
      top: 10px;
      right: 12px;
      background: none;
      border: none;
      color: #64748b;
      font-size: 22px;
      line-height: 1;
      cursor: pointer;
      padding: 2px 6px;
    }
    #sheet-close:hover { color: #e2e8f0; }

    @media (max-width: 768px) {
      #detail-col {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        z-index: 1000;
        height: 72vh;
        width: 100%;
        flex: none;
        min-width: unset;
        border-left: none;
        border-top: 1px solid #2d3148;
        border-radius: 16px 16px 0 0;
        transform: translateY(100%);
        transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      }
      #detail-col.sheet-open    { transform: translateY(0); }
      #sheet-backdrop.visible   { display: block; }
      #sheet-handle             { display: block; }
      #sheet-close              { display: block; }
      #map-col                  { flex: 1; }
      #alert-strip              { height: 140px; }
      #stats-bar                { gap: 16px; padding: 0 12px; }
    }
  </style>
</head>
<body>

<!-- ── HEADER ── -->
<header>
  <h1>YouBike Live</h1>
  <span style="color:#64748b;font-size:14px;">—</span>
  <span style="color:#94a3b8;font-size:14px;">Taipei</span>
  <span class="badge">LIVE</span>
</header>

<!-- ── STATS BAR ── -->
<div id="stats-bar">
  <!-- mobile: collapsed summary line -->
  <div id="stats-summary" onclick="toggleStats()">
    <span id="sum-dot" class="red"></span>
    <span id="sum-status" style="font-size:13px;font-weight:600;">—</span>
    <span class="sum-sep">·</span>
    <span id="sum-scrape" style="font-size:13px;color:#94a3b8;">—</span>
    <span class="sum-sep">·</span>
    <span id="sum-rows" style="font-size:13px;color:#94a3b8;">—</span>
    <span id="stats-chevron"></span>
  </div>
  <!-- desktop: always visible / mobile: expanded grid -->
  <div id="stats-grid">
    <div class="stat-item">
      <span class="stat-label">Total Rows</span>
      <span class="stat-value" id="s-rows">—</span>
    </div>
    <div class="stat-divider"></div>
    <div class="stat-item">
      <span class="stat-label">DB Size</span>
      <span class="stat-value" id="s-dbsize">—</span>
    </div>
    <div class="stat-divider"></div>
    <div class="stat-item">
      <span class="stat-label">Last Scrape</span>
      <span class="stat-value" id="s-scrape">—</span>
    </div>
    <div class="stat-divider"></div>
    <div class="stat-item">
      <span class="stat-label">Scrapes Today</span>
      <span class="stat-value" id="s-today">—</span>
    </div>
    <div class="stat-divider"></div>
    <div class="stat-item">
      <span class="stat-label">Uptime</span>
      <span class="stat-value" id="s-uptime">—</span>
    </div>
    <div class="stat-divider"></div>
    <div class="stat-item">
      <span id="status-dot" class="red"></span>
      <span class="stat-value" id="s-status">—</span>
    </div>
  </div>
</div>

<!-- mobile bottom-sheet backdrop -->
<div id="sheet-backdrop" onclick="closeSheet()"></div>

<!-- ── MAIN ── -->
<div id="main">

  <!-- LEFT: map + alert strip -->
  <div id="map-col">
    <div id="map">
      <div id="map-loading">
        <div class="spinner"></div>
        <span>Loading stations…</span>
      </div>
    </div>
    <div id="alert-strip">
      <div id="alert-tabs">
        <div class="alert-tab empty-tab active" data-tab="empty" onclick="switchTab('empty')">
          Empty <span class="count" id="cnt-empty">0</span>
        </div>
        <div class="alert-tab full-tab" data-tab="full" onclick="switchTab('full')">
          Full <span class="count" id="cnt-full">0</span>
        </div>
        <div class="alert-tab low-tab" data-tab="low" onclick="switchTab('low')">
          Low <span class="count" id="cnt-low">0</span>
        </div>
      </div>
      <div id="alert-content"></div>
    </div>
  </div>

  <!-- RIGHT: detail panel / mobile bottom sheet -->
  <div id="detail-col">
    <div id="sheet-handle"></div>
    <button id="sheet-close" onclick="closeSheet()" aria-label="Close">&#x2715;</button>
    <div id="detail-panel">
      <div id="detail-empty">
        <div class="icon">🗺</div>
        <p>Click any station to view history</p>
      </div>
      <div id="detail-info">
        <div class="station-name" id="d-name"></div>
        <div class="station-uid" id="d-uid"></div>
        <div class="counts-grid">
          <div class="count-card bikes">
            <div class="cc-label">Available</div>
            <div class="cc-val" id="d-bikes">—</div>
          </div>
          <div class="count-card docks">
            <div class="cc-label">Docks</div>
            <div class="cc-val" id="d-docks">—</div>
          </div>
          <div class="count-card cap">
            <div class="cc-label">Capacity</div>
            <div class="cc-val" id="d-cap">—</div>
          </div>
        </div>
        <div class="chart-wrap">
          <h3>24h Availability</h3>
          <div id="chart-loading" class="chart-state hidden">Loading…</div>
          <div id="chart-no-data" class="chart-state hidden">No history available</div>
          <canvas id="history-chart"></canvas>
        </div>
      </div>
    </div>
  </div>

</div>

<script>
/* ═══════════════════════════════════════════════
   CONFIG
═══════════════════════════════════════════════ */

console.log("[debug] protocol:", location.protocol, "hostname:", location.hostname, "origin:", location.origin);
const CONFIG = {
  api_base:            location.protocol === "http:" ? "" : "https://youbike-api.tunglin.workers.dev",
  refresh_interval_ms: 30000
};
console.log("[debug] api_base resolved to:", JSON.stringify(CONFIG.api_base) || "(empty string — using relative URLs)");

/* ═══════════════════════════════════════════════
   HELPERS
═══════════════════════════════════════════════ */

function formatUptime(seconds) {
  const d = Math.floor(seconds / 86400);
  const h = Math.floor((seconds % 86400) / 3600);
  const m = Math.floor((seconds % 3600) / 60);
  const parts = [];
  if (d) parts.push(d + "d");
  if (h) parts.push(h + "h");
  parts.push(m + "m");
  return parts.join(" ");
}

function formatRelativeTime(unixTs) {
  const diff = Math.floor(Date.now() / 1000 - unixTs);
  if (diff < 60) return diff + "s ago";
  if (diff < 3600) return Math.floor(diff / 60) + "m ago";
  return Math.floor(diff / 3600) + "h ago";
}

function formatHHMM(unixTs) {
  const d = new Date(unixTs * 1000);
  return d.getHours().toString().padStart(2, "0") + ":" + d.getMinutes().toString().padStart(2, "0");
}

function markerColor(available) {
  if (available === 0) return "#ef4444";
  if (available <= 4)  return "#f59e0b";
  return "#22c55e";
}

async function apiFetch(path) {
  const url = CONFIG.api_base + path;
  console.log("[debug] fetching:", url);
  try {
    const res = await fetch(url);
    if (!res.ok) throw new Error(res.status);
    return await res.json();
  } catch (e) {
    console.error("API error:", url, e);
    return null;
  }
}

/* ═══════════════════════════════════════════════
   STATS BAR
═══════════════════════════════════════════════ */

function renderStats(stats) {
  if (!stats) return;
  const scrapeLabel = formatRelativeTime(stats.last_scrape_time);
  const rowsLabel   = (stats.total_rows / 1000).toFixed(0) + "k rows";

  document.getElementById("s-rows").textContent   = stats.total_rows.toLocaleString();
  document.getElementById("s-dbsize").textContent = stats.db_size_mb.toFixed(1) + " MB";
  document.getElementById("s-scrape").textContent = scrapeLabel;
  document.getElementById("s-today").textContent  = stats.scrapes_today.toLocaleString();
  document.getElementById("s-uptime").textContent = formatUptime(stats.uptime_seconds);

  document.getElementById("sum-scrape").textContent = scrapeLabel;
  document.getElementById("sum-rows").textContent   = rowsLabel;

  const online = (Date.now() / 1000 - stats.last_scrape_time) < 600;
  const label  = online ? "Online" : "Stale";
  const color  = online ? "#22c55e" : "#ef4444";

  document.getElementById("status-dot").className   = online ? "green" : "red";
  document.getElementById("sum-dot").className      = online ? "green" : "red";
  document.getElementById("s-status").textContent   = label;
  document.getElementById("s-status").style.color   = color;
  document.getElementById("sum-status").textContent = label;
  document.getElementById("sum-status").style.color = color;
}

function toggleStats() {
  document.getElementById("stats-bar").classList.toggle("expanded");
}

/* ═══════════════════════════════════════════════
   MAP
═══════════════════════════════════════════════ */

const map = L.map("map").setView([25.0330, 121.5654], 13);
L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
  attribution: "© OpenStreetMap contributors",
  maxZoom: 19
}).addTo(map);

const markerMap = {};

function getBbox() {
  const b = map.getBounds();
  return `min_lat=${b.getSouth()}&max_lat=${b.getNorth()}&min_lng=${b.getWest()}&max_lng=${b.getEast()}`;
}

function updateMarkers(stations) {
  const inView = new Set(stations.map(s => s.station_uid));

  for (const uid of Object.keys(markerMap)) {
    if (!inView.has(uid)) {
      markerMap[uid].circle.remove();
      delete markerMap[uid];
    }
  }

  stations.forEach(st => {
    const uid = st.station_uid;
    if (markerMap[uid]) {
      markerMap[uid].circle.setStyle({ fillColor: markerColor(st.available_rent_bikes) });
      markerMap[uid].circle.setTooltipContent(`<b>${st.name}</b><br>🚲 ${st.available_rent_bikes} bikes`);
      markerMap[uid].station = st;
    } else {
      const isActive = uid === activeUid;
      const circle = L.circleMarker([st.lat, st.lng], {
        radius: 9,
        fillColor: markerColor(st.available_rent_bikes),
        color: isActive ? "#818cf8" : "#fff",
        weight: isActive ? 3 : 1.5,
        fillOpacity: 0.9
      }).addTo(map);
      circle.bindTooltip(`<b>${st.name}</b><br>🚲 ${st.available_rent_bikes} bikes`, { direction: "top", offset: [0, -6] });
      circle.on("click", () => selectStation(markerMap[uid].station));
      markerMap[uid] = { circle, station: st };
    }
  });
}

async function loadViewport() {
  const stations = await apiFetch("/stations/latest?" + getBbox());
  if (stations) updateMarkers(stations);
}

let activeUid   = null;
let historyChart = null;

async function selectStation(station) {
  if (activeUid && markerMap[activeUid]) {
    markerMap[activeUid].circle.setStyle({ weight: 1.5, color: "#fff" });
  }
  activeUid = station.station_uid;
  markerMap[station.station_uid].circle.setStyle({ weight: 3, color: "#818cf8" });
  map.panTo(markerMap[station.station_uid].circle.getLatLng());

  if (window.innerWidth <= 768) {
    document.getElementById("detail-col").classList.add("sheet-open");
    document.getElementById("sheet-backdrop").classList.add("visible");
  }

  document.getElementById("detail-empty").style.display = "none";
  document.getElementById("detail-info").classList.add("visible");
  document.getElementById("d-name").textContent  = station.name;
  document.getElementById("d-uid").textContent   = "UID: " + station.station_uid;
  document.getElementById("d-bikes").textContent = station.available_rent_bikes;
  document.getElementById("d-docks").textContent = station.available_return_bikes;
  document.getElementById("d-cap").textContent   = station.capacity;

  // Show loading, hide previous chart/no-data states
  if (historyChart) { historyChart.destroy(); historyChart = null; }
  document.getElementById("history-chart").style.display = "none";
  document.getElementById("chart-no-data").classList.add("hidden");
  document.getElementById("chart-loading").classList.remove("hidden");

  const history = await apiFetch("/history/" + station.station_uid);

  document.getElementById("chart-loading").classList.add("hidden");

  if (!history || history.length === 0) {
    document.getElementById("chart-no-data").classList.remove("hidden");
    return;
  }

  document.getElementById("history-chart").style.display = "";
  renderChart(history, station.capacity);
}

function renderChart(history, capacity) {
  if (historyChart) historyChart.destroy();
  const ctx = document.getElementById("history-chart").getContext("2d");
  historyChart = new Chart(ctx, {
    type: "line",
    data: {
      labels: history.map(h => formatHHMM(h.timestamp)),
      datasets: [{
        label: "Available bikes",
        data: history.map(h => h.available_rent_bikes),
        borderColor: "#6366f1",
        backgroundColor: "rgba(99,102,241,0.15)",
        borderWidth: 2,
        pointRadius: 0,
        fill: true,
        tension: 0.4
      }]
    },
    options: {
      animation: false,
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: {
          ticks: { color: "#64748b", maxTicksLimit: 8, font: { size: 10 } },
          grid: { color: "#1e2535" }
        },
        y: {
          min: 0,
          max: capacity,
          ticks: { color: "#64748b", font: { size: 10 }, stepSize: Math.ceil(capacity / 4) },
          grid: { color: "#1e2535" }
        }
      }
    }
  });
}

function closeSheet() {
  document.getElementById("detail-col").classList.remove("sheet-open");
  document.getElementById("sheet-backdrop").classList.remove("visible");
}

/* ═══════════════════════════════════════════════
   ALERT STRIP
═══════════════════════════════════════════════ */

let currentTab = "empty";
let liveData   = { empty: [], full: [], low: [] };

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll(".alert-tab").forEach(el => {
    el.classList.toggle("active", el.dataset.tab === tab);
  });
  renderAlertContent();
}

function renderAlerts(live) {
  if (!live) return;
  liveData = live;
  document.getElementById("cnt-empty").textContent = live.empty.length;
  document.getElementById("cnt-full").textContent  = live.full.length;
  document.getElementById("cnt-low").textContent   = live.low.length;
  renderAlertContent();
}

function renderAlertContent() {
  const items     = liveData[currentTab] || [];
  const container = document.getElementById("alert-content");

  if (items.length === 0) {
    container.innerHTML = `<div style="padding:10px;color:#4b5563;font-size:12px;">No stations in this category.</div>`;
    return;
  }

  container.innerHTML = items.map(st => {
    const countLabel = currentTab === "full"
      ? `${st.available_return_bikes} docks`
      : `${st.available_rent_bikes} bikes`;
    return `
      <div class="alert-item ${currentTab}" onclick="selectFromAlert('${st.station_uid}')">
        <span class="a-name">${st.name}</span>
        <span class="a-count">${countLabel}</span>
      </div>`;
  }).join("");
}

function selectFromAlert(uid) {
  const entry = markerMap[uid];
  if (!entry) return;
  map.setView(entry.circle.getLatLng(), 15);
  selectStation(entry.station);
}

/* ═══════════════════════════════════════════════
   INIT + REFRESH
═══════════════════════════════════════════════ */

async function refreshLive() {
  const [stats, live] = await Promise.all([
    apiFetch("/stats"),
    apiFetch("/live"),
  ]);
  renderStats(stats);
  renderAlerts(live);
}

async function init() {
  const [stations, stats, live] = await Promise.all([
    apiFetch("/stations/latest?" + getBbox()),
    apiFetch("/stats"),
    apiFetch("/live"),
  ]);

  if (stations) updateMarkers(stations);
  document.getElementById("map-loading").classList.add("hidden");

  renderStats(stats);
  renderAlerts(live);

  map.on("moveend", loadViewport);
  setInterval(() => Promise.all([refreshLive(), loadViewport()]), CONFIG.refresh_interval_ms);
}

init();
</script>
